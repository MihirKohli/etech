
services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - chroma_data:/app/data/chroma_db
      - upload_data:/app/data/uploads
      - sqlite_data:/app/data
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      retries: 3

  streamlit:
    build: .
    ports:
      - "8501:8501"
    env_file:
      - .env
    depends_on:
      - api
    command: streamlit run streamlit_ui.py --server.port 8501 --server.address 0.0.0.0
    environment:
      - API_URL=http://api:8000

  # Optional: swap SQLite for PostgreSQL
  # Uncomment below and set DATABASE_URL=postgresql+asyncpg://rag:rag@postgres:5432/ragdb in .env
  #
  # postgres:
  #   image: postgres:15-alpine
  #   environment:
  #     POSTGRES_USER: rag
  #     POSTGRES_PASSWORD: rag
  #     POSTGRES_DB: ragdb
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - pg_data:/var/lib/postgresql/data

volumes:
  chroma_data:
  upload_data:
  sqlite_data:
  # pg_data: